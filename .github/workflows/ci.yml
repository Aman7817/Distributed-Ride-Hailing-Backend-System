name: Node CI Pipeline

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-push: 
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./Backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'
          cache-dependency-path: ./Backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: login to DockerHub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin 

      - name: Build Docker image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/cab-booking-backend:latest .
          docker build -t ${{ secrets.DOCKER_USERNAME }}/cab-booking-backend:${{ github.sha }} .

      - name: Push Docker image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/cab-booking-backend:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/cab-booking-backend:${{ github.sha }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Deploy to EC2 
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/ubuntu/Distributed-Ride-Hailing-Backend-System/Backend
            echo "Starting deployment..."
            echo "Pulling latest Docker image..."
            docker compose pull backend
            echo "Restarting Docker containers..."
            docker compose down backend
            echo "Starting backend container..."
            docker compose up -d backend
            echo "Cleaning up unused Docker resources..."
            docker system prune -f 
            echo "✅ Deployment completed!"
            docker compose ps